<style>
:root{
  --red:#b91c1c;--red-d:#991b1b;--red-l:#ef4444;
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f1f1f1;--text2:#9ca3af;--green-l:#22c55e;
  --border:#2e2e2e;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;max-width:680px;margin:0 auto}
header{background:var(--red);padding:14px 16px 0;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.55)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-top h1{font-size:1.05rem;font-weight:700;flex:1}
.badge{background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600}
nav{display:flex}
nav button{flex:1;background:transparent;color:rgba(255,255,255,.65);border:none;
  border-bottom:3px solid transparent;padding:9px 4px;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .18s}
nav button.active{color:#fff;border-bottom-color:#fff}
nav button:hover{color:#fff}
main{flex:1;overflow-y:auto;padding:16px;padding-bottom:32px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:99px}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;padding:16px}
.hero{text-align:center;padding:24px 12px 16px}
.hero-icon{font-size:3rem;margin-bottom:12px}
.hero h2{font-size:1.2rem;font-weight:700;margin-bottom:8px;color:var(--red-l)}
.hero p{color:var(--text2);font-size:.87rem;line-height:1.55}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.stat{background:var(--bg3);border-radius:var(--r);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:1.8rem;font-weight:700;color:var(--red-l);line-height:1.1}
.stat-l{font-size:.7rem;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;
  font-size:.95rem;font-weight:700;cursor:pointer;transition:all .18s;text-align:center}
.btn-p{background:var(--red);color:#fff;box-shadow:0 2px 12px rgba(185,28,28,.3)}
.btn-p:hover{background:var(--red-l)}
.btn-p:active{opacity:.9}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin-top:8px}
.btn-s:hover{background:var(--bg4)}
.info-box{background:var(--bg3);border-radius:var(--r);padding:14px 16px;border-left:3px solid var(--red)}
.info-box h3{font-size:.82rem;color:var(--red-l);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.info-box li{font-size:.82rem;color:var(--text2);line-height:1.85;list-style:none}
.info-box li::before{content:"▸ ";color:var(--red-l)}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.hist-item:last-child{border-bottom:none}
.hist-date{color:var(--text2);font-size:.74rem}
.hi-s{font-weight:700}
.hi-s.pass{color:var(--green-l)}.hi-s.fail{color:var(--red-l)}
.prog-wrap{background:var(--bg3);border-radius:99px;height:5px;margin-bottom:14px;overflow:hidden}
.prog{background:var(--red);height:100%;border-radius:99px;transition:width .3s}
.exam-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.82rem;color:var(--text2)}
.timer{font-size:.92rem;font-weight:700;color:var(--red-l);background:var(--bg3);padding:4px 12px;border-radius:99px;border:1px solid var(--border)}
.timer.warn{color:#f97316;animation:pulse 1s infinite}
.timer.danger{color:var(--red-l);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.q-card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-bottom:12px}
.q-num{font-size:.7rem;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.q-text{font-size:.92rem;line-height:1.6}
.q-img-wrap{margin:12px 0;display:flex;justify-content:center}
.q-img-wrap img{width:90px;height:90px;object-fit:contain;border-radius:8px}
.answers{display:flex;flex-direction:column;gap:8px}
.ans-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);
  padding:12px 14px;text-align:left;cursor:pointer;font-size:.85rem;color:var(--text);
  line-height:1.45;transition:border-color .14s,background .14s;
  display:flex;gap:10px;align-items:flex-start;width:100%}
.ans-btn .ltr{font-weight:700;color:var(--text2);min-width:20px;flex-shrink:0;margin-top:.05em}
.ans-btn:hover:not([disabled]){border-color:var(--red);background:var(--bg4)}
.ans-btn.ok{border-color:var(--green-l)!important;background:rgba(34,197,94,.1)!important}
.ans-btn.ok .ltr{color:var(--green-l)!important}
.ans-btn.ko{border-color:var(--red-l)!important;background:rgba(239,68,68,.1)!important}
.ans-btn.ko .ltr{color:var(--red-l)!important}
.fb{border-radius:var(--r);padding:11px 14px;margin-bottom:10px;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px}
.fb.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green-l)}
.fb.ko{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red-l)}
.nav-btns{display:flex;gap:8px;margin-top:4px}
.nav-btns .btn{flex:1;margin-top:0;padding:12px}
.res-hero{text-align:center;padding:20px 12px}
.score-ring{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:2.1rem;font-weight:700;border:6px solid;line-height:1.1}
.score-ring.pass{border-color:var(--green-l);color:var(--green-l)}
.score-ring.fail{border-color:var(--red-l);color:var(--red-l)}
.ring-sub{font-size:.6rem;font-weight:500;color:var(--text2);margin-top:2px;text-transform:uppercase}
.res-lbl{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.res-sub{color:var(--text2);font-size:.83rem;line-height:1.5}
.rb-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.rb-row:last-child{border-bottom:none}
.rb-v{font-weight:700}
.rb-v.g{color:var(--green-l)}.rb-v.r{color:var(--red-l)}
.rev-item{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;padding:12px 14px}
.rev-q{font-size:.81rem;margin-bottom:8px;line-height:1.45;color:var(--text2)}
.rev-q strong{color:var(--red-l)}
.rev-img{width:60px;height:60px;object-fit:contain;border-radius:6px;margin-bottom:6px}
.rev-ans{font-size:.8rem;display:flex;gap:6px;margin-top:4px;line-height:1.4}
.rev-ans .lbl{font-weight:700;min-width:16px;flex-shrink:0}
.rev-ans.ok .lbl{color:var(--green-l)}.rev-ans.ko .lbl{color:var(--red-l)}
.sec-title{font-size:.76rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin:16px 0 8px;font-weight:700}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:10px 14px 10px 38px;color:var(--text);font-size:.88rem;outline:none;transition:border-color .18s}
.search-wrap input::placeholder{color:var(--text2)}
.search-wrap input:focus{border-color:var(--red)}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filt{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:5px 13px;border-radius:99px;font-size:.75rem;cursor:pointer;transition:all .15s;font-weight:600}
.filt.on{background:var(--red);border-color:var(--red);color:#fff}
.cnt{font-size:.76rem;color:var(--text2);margin-bottom:10px}
.s-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.s-head{padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background .14s}
.s-head:hover{background:var(--bg3)}
.s-num{font-size:.7rem;color:var(--red-l);font-weight:700;min-width:32px;margin-top:.1em;flex-shrink:0}
.s-qt{font-size:.85rem;line-height:1.45;flex:1}
.s-arr{margin-left:8px;color:var(--text2);font-size:.78rem;transition:transform .2s;flex-shrink:0;margin-top:.15em}
.s-arr.open{transform:rotate(180deg)}
.s-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.s-body.open{display:block}
.s-img-wrap{display:flex;justify-content:center;margin:10px 0 4px}
.s-img-wrap img{width:80px;height:80px;object-fit:contain;border-radius:8px}
.s-ans{padding:8px 10px;border-radius:8px;margin-top:6px;font-size:.82rem;line-height:1.45;display:flex;gap:8px}
.s-ans .ltr{font-weight:700;min-width:18px;flex-shrink:0}
.s-ans.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.s-ans.ok .ltr{color:var(--green-l)}
.s-ans.wrong{color:var(--text2);border:1px solid transparent}
mark{background:rgba(185,28,28,.28);color:var(--text);border-radius:2px;padding:0 2px}
#inst-bar{display:none;background:var(--red-d);padding:10px 16px;align-items:center;gap:10px;font-size:.82rem;flex-shrink:0}
#inst-bar .i-btn{background:#fff;color:var(--red-d);border:none;padding:5px 14px;border-radius:99px;font-weight:700;cursor:pointer;font-size:.79rem}
#inst-bar .i-close{background:transparent;color:rgba(255,255,255,.7);border:none;padding:4px 8px;cursor:pointer;margin-left:auto;font-size:1rem}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--bg4);color:var(--text);padding:10px 20px;border-radius:99px;font-size:.82rem;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-ico{font-size:2.5rem;margin-bottom:12px}
</style>
</head>

<script>
const Q=[{"id": 1, "q": "Si definisce combustione", "a": "qualunque reazione chimica nella quale alcune sostanze (reagenti) si trasformano in altre (prodotti)", "b": "la trasformazione che un materiale subisce nella sua forma, senza che venga alterata la sua natura chimica", "c": "qualunque reazione chimica nella quale un combustibile reagisce con un comburente dando luogo a sviluppo di calore, fiamme, gas e fumi", "correct": "c", "img": null}, {"id": 2, "q": "Affinché la reazione di combustione abbia luogo è necessaria la presenza di una fonte di innesco, cioè:", "a": "esclusivamente di una fiamma libera che fornisca l'energia necessaria per attivare la reazione di combustione", "b": "di una generica sorgente di calore che fornisca l'energia necessaria per attivare la reazione di combustione", "c": "di un adeguata percentuale di ossigeno nell’aria", "correct": "b", "img": null}, {"id": 3, "q": "Affinché la reazione di combustione abbia inizio, deve sempre verificarsi:", "a": "La contemporanea presenza del combustibile e del comburente", "b": "La contemporanea presenza del combustibile, del comburente e dell’innesco/sorgente di calore", "c": "La contemporanea presenza del combustibile e della giusta temperatura o innesco", "correct": "b", "img": null}, {"id": 4, "q": "In caso di mancata presenza di uno degli elementi del “triangolo del fuoco” (combustibile, comburente e innesco/sorgente di calore)", "a": "La reazione di combustione (incendio) può avvenire lo stesso con percentuali elevate di ossigeno in aria", "b": "La reazione di combustione (incendio) non ha luogo", "c": "La reazione di combustione (incendio) può avvenire lo stesso se in presenza di un’adeguata quantità di materiale combustibile", "correct": "b", "img": null}, {"id": 5, "q": "La propagazione della combustione richiede la presenza contemporanea di", "a": "Combustibile, comburente e temperatura adeguata", "b": "Combustibili e temperatura adeguata", "c": "Comburente e temperatura adeguata", "correct": "a", "img": null}, {"id": 6, "q": "Il combustibile è:", "a": "Qualunque sostanza ossidante, in genere l’ossigeno presente nell’aria, che partecipa alla reazione di combustione", "b": "Il calore fornito alle sostanze combustibili e comburenti per attivare la reazione di combustione", "c": "Qualunque sostanza che, ossidandosi, partecipa alla reazione chimica di combustione", "correct": "c", "img": null}, {"id": 7, "q": "Il comburente è:", "a": "una sostanza che a contatto con altre sostanze combustibili provoca una reazione endotermica", "b": "una sostanza che a contatto con altre sostanze combustibili provoca una reazione esotermica", "c": "una sostanza che a contatto con altre sostanze comburenti provoca una reazione esotermica", "correct": "b", "img": null}, {"id": 8, "q": "Per ottenere lo spegnimento dell’incendio si può ricorrere", "a": "al solo raffreddamento", "b": "all’esaurimento del combustibile e/o al soffocamento", "c": "a una qualsiasi combinazione di soffocamento, raffreddamento, inibizione chimica, esaurimento del combustibile", "correct": "c", "img": null}, {"id": 9, "q": "Per ottenere lo spegnimento dell’incendio si può ricorrere all’esaurimento del combustibile, che consiste", "a": "Nell’allontanamento o separazione della sostanza combustibile dal focolaio d’incendio;", "b": "Nella separazione del comburente dal combustibile o riduzione della concentrazione di comburente in aria;", "c": "Nella sottrazione di calore fino ad ottenere una temperatura inferiore a quella necessaria al mantenimento della combustione;", "correct": "a", "img": null}, {"id": 10, "q": "Per ottenere lo spegnimento dell’incendio si può ricorrere al soffocamento, che consiste", "a": "Nell’allontanamento o separazione della sostanza combustibile dal focolaio d’incendio;", "b": "Nella separazione del comburente dal combustibile o riduzione della concentrazione di comburente in aria;", "c": "Nella sottrazione di calore fino ad ottenere una temperatura inferiore a quella necessaria e (petrolio, vernici, nafta, benzina ….)", "c": "incendi di gas infiammabili (metano, propano, g.p.l., cloro, idrogeno ….)", "correct": "c", "img": null}, {"id": 16, "q": "Gli incendi di Classe D, in relazione allo stato fisico dei materiali combustibili, sono:", "a": "incendi di materiali solidi con formazione di braci (carta, cartoni, libri, legna, segatura,  ….)", "b": "incendi di metalli combustibili e sostanze chimiche contenenti ossigeno comburente (magnesio, potassio, fosforo, sodio, titanio, alluminio, carburi, nitrati, clorati, perclorati, perossidi ….).", "c": "incendi che interessano sostanze usate nella cottura (oli e grassi vegetali o animali)", "correct": "b", "img": null}, {"id": 17, "q": "Gli incendi di Classe F, in relazione allo stato fisico dei materiali combustibili, sono:", "a": "incendi di materiali solidi con formazione di braci (carta, cartoni, libri, legna, segatura,  ….)", "b": "incendi di metalli combustibili e sostanze chimiche contenenti ossigeno comburente (magnesio, potassio, fosforo, sodio, titanio, alluminio, carburi, nitrati, clorati, perclorati, perossidi ….).", "c": "incendi che interessano sostanze usate nella cottura (oli e grassi vegetali o animali)", "correct": "c", "img": null}, {"id": 18, "q": "Il combustibile, sostanza che si trasforma durante l’incendio, può trovarsi allo stato solido, liquido o gassoso:", "a": "No, i combustibili sono sostanze solo allo stato solido", "b": "No, i combustibili sono sostanze che possono essere solo allo stato solido o liquido", "c": "Si, i combustibili possono trovarsi in uno dei tre stati (combustibile solido, liquido o gassoso)", "correct": "c", "img": null}, {"id": 19, "q": "La temperatura in corrispondenza della quale inizia la combustione è definita:", "a": "Temperatura di infiammabilità", "b": "Temperatura di ebollizione", "c": "temperatura di accensione o temperatura di ignizione", "correct": "c", "img": null}, {"id": 20, "q": "La più bassa temperatura alla quale un combustibile liqu mg": null}, {"id": 69, "q": "La CO2 è generalmente sconsigliata su apparecchiature sensibili alle brusche variazioni di temperatura", "a": "Si,", "b": "No, la CO2 agisce solo per soffocamento non determinando problemi di raffreddamento", "c": "Si, ma solo su apparecchiature sotto tensione", "correct": "a", "img": null}, {"id": 70, "q": "Con il termine “rischio di incendio” intendiamo", "a": "la probabilità che l’evento incendio si verifichi (frequenza) e l’entità dei danni sulle persone e i beni presenti negli ambienti considerati conseguenti al verificarsi dell’evento (magnitudo)", "b": "La proprietà o la qualità intrinseca di determinati materiali o attrezzature, oppure metodologie e pratiche del lavoro o di utilizzo di un ambiente”, “potenzialmente capaci di causare un incendio”", "c": "Nessuna delle definizioni riportate negli altri punti", "correct": "a", "img": null}, {"id": 71, "q": "La mitigazione del “rischio di incendio” è possibile attraverso una adeguata progettazione e realizzazione", "a": "di sole misure di prevenzione degli incendi (es: realizzazione impianti a regola d’arte …) e di protezione (es: installazione estintori, idranti, …)", "b": "di sole misure precauzionali di esercizio (misure gestionali)", "c": "di misure di prevenzione degli incendi (es: realizzazione impianti a regola d’arte …), di protezione (es: installazione estintori, idranti, …) e di misure precauzionali di esercizio (misure gestionali)", "correct": "c", "img": null}, {"id": 72, "q": "Le misure di prevenzione, propriamente dette, sono", "a": "tutte le misure finalizzate alla riduzione del rischio incendio mediante la riduzione della probabilità/frequenza di accadimento dell’evento (impianti a regola d’arte, …)", "b": "tutte le misure finalizzate alla riduzione del rischio incendio mediante la riduzione del danno conseguente all’evento (es: impianti antincendio, porte tagliafuoco, vie di esodo, …)", "c": "Tutte le misure finalizzate al mantenimento del livello di sicurezza raggiunto nella progettazione della sicurezza antincendio del luogo di lavoro (manutenzione, controllo, sorveglianza, formazione, addestramento, pianificazione emergenza, e….", "correct": "a", "img": null}, {"id": 73, "q": "Nei luoghi di lavoro, in conformità alle disposizioni dettate dal Dlgs 81/2008, è sempre obbligatorio per il Datore di Lavoro adottare idonee misure per prevenire gli incendi e tutelare l’incolumità delle persone", "a": "No, si attuano solo se a seguito di specifica valutazione del rischio incendio il luogo di lavoro non risulta a rischio di incendio basso", "b": "No, solo per i luoghi di lavoro che sono contemporaneamente attività soggette ai controlli dei vigili del fuoco", "c": "Si, nei luoghi di lavoro è sempre obbligatorio adottare misure per prevenire gli incendi", "correct": "c", "img": null}, {"id": 74, "q": "Le misure di protezione sono", "a": "tutte le misure finalizzate alla riduzione del rischio incendio mediante la riduzione della probabilità/frequenza di accadimento dell’evento (impianti a regola d’arte,  …)", "b": "tutte le misure finalizzate alla riduzione del rischio incendio mediante la riduzione del danno conseguente all’evento (es: impianti antincendio, porte tagliafuoco, vie di esodo, …)", "c": "Tutte le misure finalizzate al mantenimento del livello di sicurezza raggiunto nella progettazione della sicurezza antincendio del luogo di lavoro (manutenzione, controllo, sorveglianza, formazione, addestramento, pianificazione emergenza, e….", "correct": "b", "img": null}, {"id": 75, "q": "Le misure di protezione attiva sono", "a": "tutti quei dispositivi che, a seguito della rivelazione di un incendio, sono in grado di esplicare l’azione protettiva senza richiedere alcuna azione (impiantistica o umana)", "b": "tutti quei dispositivi che, a seguito della rivelazione di un incendio, per esplicare l’azione protettiva necessitano di un intervento o un’azione (impiantistica o umana)", "c": "tutti quei dispositivi che consentono di ridurre la antistica o umana)", "c": "Sono misure di prevenzione in quanto, la loro realizzazione consente di ridurre la frequenza di accadimento degli incendi", "correct": "a", "img": null}, {"id": 80, "q": "Le porte EI “tagliafuoco”, munite di “fermi elettromagnetici in apertura” asserviti a impianti IRAI, sono", "a": "Misure di protezione passiva in quanto, per esplicare l’azione protettiva non necessitano di alcuna azione (impiantistica o umana)", "b": "Misure di protezione attiva in quanto, per esplicare l’azione protettiva necessitano di un intervento o un’azione (impiantistica o umana)", "c": "Sono misure di prevenzione in quanto, la loro realizzazione consente di ridurre la frequenza di accadimento degli incendi", "correct": "b", "img": null}, {"id": 81, "q": "Nell’ambito della sicurezza antincendio, il rischio per la salvaguardia dell’incolumità delle persone è caratterizzato", "a": "dalla caratteristica prevalente degli occupanti (occ) e dalla velocità caratteristica prevalente di crescita dell’incendio (),", "b": "Solo dalla velocità di crescita dell’incendio (),", "c": "Solo dalle caratteristiche degli occupanti (occ)", "correct": "a", "img": null}, {"id": 82, "q": "Che cosa si intende per fattore occ nell’individuazione del profilo di rischio Rvita:", "a": "si intendono le caratteristiche prevalenti degli occupanti che sono classificate in 5 categorie, in base allo stato di veglia e di conoscenza del luogo", "b": "si intendono le caratteristiche degli occupanti che per vulnerabilità sono più rappresentativi dell’attività svolta nell’ambito considerato (persone anziane, bambini, ecc)", "c": "si intendono le caratteristiche degli occupanti che per numerosità e tipologia sono mediamente rappresentativi dell’attività svolta nell’ambito considerato", "correct": "a", "img": null}, {"id": 83, "q": "La velocità caratteristica prevalente di crescita dell’incendio (), fattore necessario per caratterizzare il rischio per la salvaguarda dell’incolumità delle persone", "a": "R peratore che si dichiara idoneo ed esperto", "b": "Si, il DM 1/09/2021 introduce la figura del manutentore dei presidi antincendio al fine di garantirne la piena efficienza", "c": "No, l’attività di manutenzione dei presidi antincendio non è necessaria per mantenere in efficienza i presidi antincendio", "correct": "b", "img": null}, {"id": 129, "q": "Con il termine “manutenzione” dei presidi antincendio intendiamo", "a": "un’operazione o un intervento finalizzato a mantenere in efficienza ed in buono stato, impianti, attrezzature e altri sistemi di sicurezza antincendio", "b": "un’operazione o un intervento finalizzato a garantire la corretta progettazione e installazione dei presidi antincendio", "c": "Lo svolgimento dei controlli visivi dei presidi antincendio atti a verificare, che gli impianti, le attrezzature e gli altri sistemi di sicurezza antincendio siano nelle normali condizioni operative, siano correttamente fruibili e non presentino danni materiali evidenti", "correct": "a", "img": null}, {"id": 130, "q": "Con “sorveglianza” dei presidi antincendio intendiamo", "a": "un’operazione o un intervento finalizzato a mantenere in efficienza ed in buono stato, impianti, attrezzature e altri sistemi di sicurezza antincendio", "b": "un’operazione o un intervento finalizzato a garantire la corretta progettazione e installazione dei presidi antincendio", "c": "Lo svolgimento dei controlli visivi dei presidi antincendio atti a verificare, che gli impianti, le attrezzature e gli altri sistemi di sicurezza antincendio siano nelle normali condizioni operative, correttamente fruibili e non presentino danni materiali evidenti", "correct": "c", "img": null}, {"id": 131, "q": "Il tecnico manutentore qualificato è", "a": "Una qualunque persona che ha esperienza nel campo della manutenzione", "b": "È un tecnico abilitato (ingegnere, architetto, ecc)", "c": "Una persona fisica in possesso dei requisiti tecnico professionali previsti dal D.M 1 settembre 2021 (conoscenza, competenza, abilità)", "correct": "c", "img": null}, {"id": 132, "q": "Il controllo periodico è", "a": "L’insieme delle operazioni che devono essere effettuate quando si verifica un guasto ad un dispositivo di sicurezza antincendio", "b": "Lo svolgimento dei controlli visivi dei presidi antincendio atti a verificare, che gli impianti, le attrezzature e gli altri sistemi di sicurezza antincendio siano nelle normali condizioni operative, siano correttamente fruibili e non presentino danni materiali evidenti", "c": "L’insieme di operazioni che devono essere effettuate con frequenza non superiore a quella indicata da disposizioni, norme, specifiche tecniche o manuali d'uso e manutenzione per verificare la completa e corretta funzionalità di impianti, attrezzature e altri sistemi di sicurezza antincendio", "correct": "c", "img": null}, {"id": 133, "q": "Il controllo periodico dei presidi antincendio", "a": "Può essere effettuata anche dai lavoratori normalmente presenti, dopo aver ricevuto adeguate istruzioni", "b": "Può essere effettuata anche dai lavoratori normalmente presenti, anche senza specifiche istruzioni", "c": "Può essere effettuata solo da un tecnico manutentore qualificato, in quanto presuppone un livello adeguato di competenze, conoscenze ed abilità", "correct": "c", "img": null}, {"id": 134, "q": "La sorveglianza dei presidi antincendio", "a": "Può essere effettuata anche dai lavoratori normalmente presenti, dopo aver ricevuto adeguate istruzioni", "b": "Può essere effettuata anche dai lavoratori normalmente presenti, anche senza specifiche istruzioni", "c": "Può essere effettuata solo da un tecnico manutentore qualificato, in quanto presuppone un livello adeguato di competenze, conoscenze ed abilità", "correct": "a", "img": null}, {"id": 135, "q": "Per “aree a rischio specifico” si intende:", "a": "ambiti dell’attività caratterizzati da rischio di incendio sostanzialmente differente rispetto a quello tipico dell’attività", "b": "I locali dove sono installati gli impianti tecnologici e di servizio", "c": "Unicamente i luoghi dove possono formarsi atmosfere esplosive", "correct": "a", "img": null}, {"id": 136, "q": "L’eventuale presenza di “aree a rischio specifico”", "a": "deve essere individuata dal progettista della sicurezza antincendio sulla base delle regole tecniche di prevenzione incendi, della valutazione del rischio incendio e di alcuni criteri definiti dalle regole di progettazione generale della sicurezza antincendio", "b": "È individuata dal datore di lavoro, sulla base della sua esperienza", "c": "E’ individuata dal progettista della sicurezza antincendio solo sulla base della propria esperienza", "correct": "a", "img": null}, {"id": 137, "q": "L’esplosione è:", "a": "una lacerazione improvvisa e fragorosa di un corpo solido e cavo per l'azione di un'eccessiva pressione dall'interno che ne vince la forza di coesione", "b": "un rumore secco e improvviso", "c": "il risultato di una rapida espansione di gas determinata da una reazione di combustione molto veloce.", "correct": "c", "img": null}, {"id": 138, "q": "Le atmosfere esplosive sono", "a": "miscele di sostanze infiammabili allo stato di gas con l’aria, a condizioni atmosferiche, in cui, dopo l’accensione, la combustione si propaga nell’insieme della miscela incombusta", "b": "miscele di sostanze infiammabili allo stato di di polveri con l’aria, a condizioni atmosferiche, in cui, dopo l’accensione, la combustione si propaga nell’insieme della miscela incombusta", "c": "miscele di sostanze infiammabili allo stato di gas, vapori, nebbie o di polveri con l’aria, a condizioni atmosferiche, in cui, dopo l’accensione, la combustione si propaga nell’insieme della miscela incombusta", "correct": "c", "img": null}, {"id": 139, "q": "Le sostanze in grado di produrre esplosioni sono", "a": "Solo le miscele infiammabili di gas o vapori", "b": "Tutte le sostanze indicate negli altri due punti", "c": "Solo le polveri combustibili sospese in aria", "correct": "b", "img": null}, {"id": 140, "q": "Un’esplosione è chiamata deflagrazione quando:", "a": "L’esplosione è prodotta da sostanze esplosive", "b": "la reazione di combustione si propaga alla miscela infiammabile non ancora bruciata con una velocità minore di quella del suono", "c": "la reazione procede nella miscela non ancora bruciata con una velocità superiore a quella del suono (velocità di propagazione supersoniche dell’ordine del chilometro al secondo)", "correct": "b", "img": null}, {"id": 141, "q": "Un’esplosione è chiamata detonazione quando:", "a": "L’esplosione è prodotta da sostanze esplosive", "b": "la reazione di combustione si propaga alla miscela infiammabile non ancora bruciata con una velocità minore di quella del suono", "c": "la reazione procede nella miscela non ancora bruciata con una velocità superiore a quella del suono (velocità di propagazione supersoniche dell’ordine del chilometro al secondo)", "correct": "c", "img": null}, {"id": 142, "q": "Ai seni del DLgs 81/2008, il seguente segnale", "a": "È un segnale di avvertimento per indicare le aree in cui possono formarsi atmosfere esplosive", "b": "È un segnale di pericolo per indicare aree dove possono formarsi atmosfere esplosive", "c": "Non esiste", "correct": "a", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz4KICA8cG9seWdvbiBwb2ludHM9JzUwLDUgOTUsOTIgNSw5MicgZmlsbD0nI0Y5QTgwMCcgc3Ryb2tlPScjMWExYTFhJyBzdHJva2Utd2lkdGg9JzQnIHN0cm9rZS1saW5lam9pbj0ncm91bmQnLz4KICA8dGV4dCB4PSc1MCcgeT0nNzgnIGZvbnQtc2l6ZT0nMjgnIGZvbnQtd2VpZ2h0PSdib2xkJyBmaWxsPScjMWExYTFhJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmb250LWZhbWlseT0nQXJpYWwnPkVYPC90ZXh0PgogIDxsaW5lIHgxPSczMCcgeTE9JzUyJyB4Mj0nNzAnIHkyPSc1Micgc3Ryb2tlPScjMWExYTFhJyBzdHJva2Utd2lkdGg9JzMnLz4KPC9zdmc+"}, {"id": 143, "q": "La reazione al fuoco rappresenta", "a": "il comportamento di un materiale che, con la sua decomposizione, partecipa al fuoco al quale è stato sottoposto in specifiche condizioni", "b": "grado di partecipazione di un materiale (o di un prodotto) al fuoco al quale è stato sottoposto", "c": "la capacità portante in caso di incendio, per una struttura, per una parte della struttura o per un elemento  strutturale nonché la capacità di compartimentazione in caso di incendio per gli elementi di separazione strutturali (es. muri, solai, …) e non strutturali (es. porte, divisori, …).", "correct": "b", "img": null}, {"id": 144, "q": "La misura antincendio “reazione al fuoco”", "a": "È una misura di protezione passiva che esplica i suoi principali effetti nella fase iniziale dell’incendio, con l’obiettivo di limitare l’innesco dei materiali e la propagazione dell’incendio.", "b": "È una misura di protezione passiva che esplica i suoi principali effetti nella fase generalizzata dell’incendio, con l’obiettivo di limitare la propagazione dell’incendio", "c": "È una misura di protezione attiva che esplica i suoi principali effetti nella fase iniziale dell’incendio, con l’obiettivo di limitare l’innesco dei materiali e la propagazione dell’incendio.", "correct": "a", "img": null}, {"id": 145, "q": "Le classi di reazione al fuoco 1 IM, 2 IM e 3 IM", "a": "Esprimono la classificazione alla reazione al fuoco dei mobili imbottiti", "b": "Esprimono la classificazione alla reazione al fuoco dei prodotti da costruzione", "c": "Non esprimono una classificazione al fuoco per nessun materiale", "correct": "a", "img": null}, {"id": 146, "q": "Le classi di reazione al fuoco 0, 1, 2, 3, 4 e 5", "a": "Esprimono le classi italiane di reazione al fuoco dei materiali", "b": "Esprimono le classi europee di reazione al fuoco dei materiali", "c": "Non esprimono una classificazione al fuoco per nessun materiale", "correct": "a", "img": null}, {"id": 147, "q": "Le classi di reazione al fuoco A1, A2, B, C, D, E ed F", "a": "Esprimono le classi italiane di reazione al fuoco dei materiali", "b": "Esprimono le classi europee di reazione al fuoco dei prodotti da costruzione", "c": "Non esprimono una classificazione al fuoco per nessun materiale", "correct": "b", "img": null}, {"id": 148, "q": "Le classi di reazione al fuoco", "a": "Sono determinate sperimentalmente, con prove di laboratorio", "b": "Sono determinate dal progettista antincendio", "c": "Sono stabilite dal produttore del materiale sulla base di norme di buona progettazione", "correct": "a", "img": null}, {"id": 149, "q": "La Resistenza al fuoco rappresenta", "a": "la capacità portante in caso di incendio, per una struttura, per una parte della struttura o per un elemento strutturale", "b": "la capacità portante in caso di incendio, per una struttura, per una parte della struttura o per un elemento strutturale nonché la capacità di compartimentazione in caso di incendio per gli elementi di separazione strutturali (es. muri, solai, …) e non strutturali (es. porte, divisori, …).", "c": "la capacità di compartimentazione in caso di incendio per gli elementi di separazione strutturali (es. muri, solai, …) e non strutturali (es. porte, divisori, …).", "correct": "b", "img": null}, {"id": 150, "q": "La finalità della Resistenza al fuoco è", "a": "quella di garantire la capacità portante delle strutture in condizioni di incendio nonché la capacità di compartimentazione, per un tempo minimo necessario al raggiungimento degli obiettivi di sicurezza di prevenzione incendi", "b": "quella di garantire la capacità portante delle strutture in condizioni di incendio nonché la capacità di compartimentazione, per tutta la durata dell’incendio", "c": "quella di garantire la capacità portante delle strutture in condizioni di incendio nonché la capacità di compartimentazione, il tempo sufficiente a garantire l’esodo delle persone", "correct": "a", "img": null}, {"id": 151, "q": "La Classe di Resistenza al fuoco (es: R 60, R 90, … ) è", "a": "intervallo di tempo espresso in minuti, definito in base al carico di incendio specifico di progetto, durante il quale il compartimento antincendio garantisce la resistenza al fuoco", "b": "intervallo di tempo espresso in secondi, definito in base al carico di incendio specifico di progetto, durante il quale il compartimento antincendio garantisce la resistenza al fuoco", "c": "intervallo di tempo espresso in ore, definito in base al carico di incendio specifico di progetto, durante il quale il compartimento antincendio garantisce la resistenza al fuoco", "correct": "a", "img": null}, {"id": 152, "q": "Con il simbolo R, utilizzato nella sigla REI (es: REI 60, REI 90), indichiamo la seguente prestazione di resistenza al fuoco", "a": "La capacità portante, cioè la capacità di un elemento strutturale di portare i carichi presenti in condizioni di incendio normalizzato, per un certo periodo di tempo", "b": "La tenuta, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio di fumi e gas caldi per un certo periodo di tempo, in condizioni di incendio normalizzate", "c": "L’isolamento, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio calore di un incendio normalizzato per un certo periodo di tempo", "correct": "a", "img": null}, {"id": 153, "q": "Con il simbolo E, utilizzato nella sigla REI (es: REI 60, REI 90), indichiamo la seguente prestazione di resistenza al fuoco", "a": "La capacità portante, cioè la capacità di un elemento strutturale di portare i carichi presenti in condizioni di incendio normalizzato, per un certo periodo di tempo", "b": "La tenuta, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio di fumi e gas caldi per un certo periodo di tempo, in condizioni di incendio normalizzate", "c": "L’isolamento, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio calore di un incendio normalizzato per un certo periodo di tempo", "correct": "b", "img": null}, {"id": 154, "q": "Con il simbolo I, utilizzato nella sigla REI (es: REI 60, REI 90), indichiamo la seguente prestazione di resistenza al fuoco", "a": "La capacità portante, cioè la capacità di un elemento strutturale di portare i carichi presenti in condizioni di incendio normalizzato, per un certo periodo di tempo", "b": "La tenuta, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio di fumi e gas caldi per un certo periodo di tempo, in condizioni di incendio normalizzate", "c": "L’isolamento, cioè la capacità di un elemento costruttivo o strutturale di impedire il passaggio calore di un incendio normalizzato per un certo periodo di tempo", "correct": "c", "img": null}, {"id": 155, "q": "Con il simbolo REI 60 si identifica un elemento costruttivo che", "a": "deve conservare, per 60 minuti, la capacità portante, la tenuta e l’isolamento termico", "b": "deve conservare, per 60 minuti, la capacità portante e la tenuta", "c": "deve conservare, per 60 minuti, solo la capacità portante.", "correct": "a", "img": null}, {"id": 156, "q": "Con il simbolo RE 60 si identifica un elemento costruttivo che", "a": "deve conservare, per 60 minuti, la capacità portante, la tenuta e l’isolamento termico", "b": "deve conservare, per 60 minuti, la capacità portante e la tenuta", "c": "deve conservare, per 60 minuti, solo la capacità portante.", "correct": "b", "img": null}, {"id": 157, "q": "Con il simbolo R 60 si identifica un elemento costruttivo che", "a": "deve conservare, per 60 minuti, la capacità portante, la tenuta e l’isolamento termico", "b": "deve conservare, per 60 minuti, la capacità portante e la tenuta", "c": "deve conservare, per 60 minuti, solo la capacità portante.", "correct": "c", "img": null}, {"id": 158, "q": "La Capacità di Compartimentazione rappresenta", "a": "attitudine di un elemento costruttivo a conservare, sotto l’azione del fuoco, un sufficiente isolamento termico (I) ed una sufficiente tenuta ai fumi e ai gas caldi della combustione (E), nonché tutte le altre eventuali prestazioni se richieste", "b": "la sola attitudine di un elemento costruttivo a conservare, sotto l’azione del fuoco, un sufficiente isolamento termico (I)", "c": "la sola attitudine di un elemento costruttivo a conservare, sotto l’azione del fuoco, una sufficiente tenuta ai fumi e ai gas caldi della combustione (E)", "correct": "a", "img": null}, {"id": 159, "q": "Con il termine “compartimento” intendiamo", "a": "parte dell’opera da costruzione delimitata da prodotti o elementi costruttivi idonei a garantire, sotto l’azione del fuoco e per un dato intervallo di tempo, la resistenza al fuoco (EI, …)", "b": "parte dell’opera da costruzione nella quale la probabilità di avvio e sviluppo dell’incendio sia resa trascurabile", "c": "spazio “cielo libero” avente caratteristiche tali da contrastare temporaneamente la propagazione dell’incendio tra le eventuali opere da costruzione o strutture che lo delimitano", "correct": "a", "img": null}, {"id": 160, "q": "Con il termine “filtro” intendiamo", "a": "parte dell’opera da costruzione delimitata da prodotti o elementi costruttivi idonei a garantire, sotto l’azione del fuoco e per un dato intervallo di tempo, la resistenza al fuoco (EI, …)", "b": "Un compartimento antincendio nel quale, per basso carico di incendio e limitata presenza di sorgenti di innesco, la probabilità di avvio e sviluppo dell’incendio è resa trascurabile", "c": "spazio “cielo libero” avente caratteristiche tali da contrastare temporaneamente la propagazione dell’incendio tra le eventuali opere da costruzione o strutture che lo delimitano", "correct": "b", "img": null}, {"id": 161, "q": "Con il termine “compartimento a prova di fumo” intendiamo", "a": "un compartimento separato dagli altri compartimenti adiacenti mediante strutture EI adeguate senza alcuna comunicazione", "b": "un compartimento realizzato in modo da limitare l’ingresso di fumo generato da un incendio che si sviluppa in compartimenti comunicanti", "c": "Un compartimento dove è vietato fumare", "correct": "b", "img": null}, {"id": 162, "q": "Con il termine “filtro a prova di fumo” intendiamo", "a": "Un compartimento antincendio realizzato con i requisiti di “filtro”, cioè dove è improbabile l’innesco di un incendio, e anche con i requisiti di un compartimento a “prova di fumo”, cioè nel quale è impedito anche l’ingresso di effluenti dell’incendio", "b": "Un disimpegno realizzato con strutture e porte REI\\EI mantenuto in sovrappressione, ovvero dotato di camino di smaltimento dei fumi o aerato direttamente verso l’esterno", "c": "Un compartimento antincendio avente anche i requisiti di compartimento a “prova di fumo”, cioè nel quale è impedito l’ingresso di effluenti dell’incendio", "correct": "b", "img": null}, {"id": 163, "q": "La finalità della Compartimentazione è quella di", "a": "limitare la propagazione dell’incendio e dei suoi effetti verso altre attività, afferenti ad altro responsabile dell’attività o di diversa tipologia, e all’interno della stessa attività", "b": "limitare la propagazione dell’incendio e dei suoi effetti solo all’interno della stessa attività", "c": "limitare la propagazione dell’incendio e dei suoi effetti solo verso altre attività, afferenti ad altro responsabile dell’attività o di diversa tipologia", "correct": "a", "img": null}, {"id": 164, "q": "La compartimentazione è realizzata mediante", "a": "Elementi strutturali e non aventi la capacità di conservare, sotto l’azione del fuoco, i requisiti di resistenza, tenuta ai fumi e isolamento termico per un determinato intervallo di tempo", "b": "interposizione di distanze di separazione, tra opere da costruzione o altri bersagli combustibili, anche ubicati in spazio a cielo libero", "c": "Entrambe le modalità indicate negli altri due punti", "correct": "c", "img": null}, {"id": 165, "q": "Al fine di realizzare una compartimentazione efficace è fondamentale che le chiusure d’ambito orizzontali e verticali costituiscano una barriera continua ed uniforme contro la propagazione degli effetti dell’incendio", "a": "No, eventuali discontinuità, grandi o piccole, (attraversamenti di impianti tecnologici o di processo, canalizzazioni, ecc) non invalidano le proprietà di compartimentazione delle chiusure di ambito", "b": "La continuità delle chiusure di ambito orizzontali e verticali sono fondamentali per garantire una effettiva ed efficace compartimentazione; pertanto, la loro realizzazione deve essere particolarmente accurata (giunzioni, serrande tagliafuoco, ecc)", "c": "Si, ma solo in caso di attività utilizzate prevalentemente da persone classificabili di tipo C, D ed E ai fini del Rvita", "correct": "b", "img": null}, {"id": 166, "q": "Fra diverse attività o ambiti della stessa attività, separate da spazio a cielo libero, è possibile la propagazione di un incendio", "a": "No, mai; l’interposizione di uno spazio superiormente libero (cortile, strada, ecc) fra due edifici non consente la propagazione di un incendio in nessun caso", "b": "Si, pertanto, al fine di impedire la propagazione di un incendio all’esterno di un’attività è sempre necessario verificare che sia esistente una adeguata distanza di separazione fra ambiti della stessa attività o verso altre attività", "c": "Si, ma solo in caso di attività non classificabili a basso rischio di incendio", "correct": "b", "img": null}, {"id": 167, "q": "La porta “taglia fuoco” (porta EI) è", "a": "L’elemento di chiusura di un varco di comunicazione tra compartimenti adiacenti, in grado di limitare per un determinato intervallo di tempo la propagazione degli effetti di un incendio", "b": "L’elemento di chiusura di un varco di comunicazione tra scala protetta e piani serviti, in grado di limitare per un determinato intervallo di tempo la propagazione degli effetti di un incendio", "c": "L’elemento di chiusura di un varco di comunicazione tra la scala a prova di fumo e i piani serviti, in grado di limitare per un determinato intervallo di tempo la propagazione degli effetti di un incendio", "correct": "a", "img": null}, {"id": 168, "q": "La porta “taglia fuoco” (porta EI), elemento di chiusura di un varco di comunicazione tra compartimenti adiacenti, in grado di limitare per un determinato intervallo di tempo la propagazione degli effetti di un incendio", "a": "deve essere adeguatamente segnalata su entrambi i lati e oggetto di specifica attività di sorveglianza, controllo e manutenzione", "b": "non deve essere segnalata né oggetto di specifica attività di sorveglianza, controllo e manutenzione", "c": "deve essere sempre colorata di “rosso”", "correct": "a", "img": null}, {"id": 169, "q": "Qualunque spazio a cielo libero (es: cortile, cavedio, …) è qualificabile come “spazio scoperto” ai fini del contrasto temporaneo alla propagazione dell’incendio tre le opere da costruzione o strutture che lo delimitano", "a": "Si, è sufficiente che un’area sia a “cielo libero”, a prescindere dalla superficie e dalle distanze fra le strutture che la delimitano, per contrastare la propagazione dell’incendio tra le opere", "b": "No, un’area a “cielo libero” per potere essere qualificata come “spazio scoperto” deve avere una superficie determinata e deve essere garantita una adeguata distanza fra gli eventuali edifici che la delimitano", "c": "No, nessun spazio a “cielo libero” può essere qualificato come “spazio scoperto” ai fini del contrasto alla propagazione di un incendio fra edifici che lo delimitano", "correct": "b", "img": null}, {"id": 170, "q": "L’interposizione di un’adeguata distanza di separazione “d” in spazio a cielo libero fra edifici adiacenti ovvero fra edifici e depositi esterni di materiale combustibile, opportunamente valutata sulla base delle indicazioni fornite dalle regole di prevenzioni incendi, consente di limitare la propagazione dell’incendio.", "a": "Si, un’adeguata distanza di separazione consente di limitare l’irraggiamento, al di sotto di valori critici, fra il compartimento interessato dall’incendio e altri compartimenti o materiali combustibili in deposito", "b": "No, non è necessario valutare tali distanze, qualunque spazio a cielo libero consente di garantire la limitazione della propagazione dell’incendio", "c": "No, solo strutture o elementi tagliafuoco (REI, EI …) consente di limitare la propagazione dell’incendio", "correct": "a", "img": null}, {"id": 171, "q": "Nella progettazione della sicurezza antincendio è consentito che si realizzino opere prive di resistenza al fuoco (Livello di prestazione I ai sensi del DM 03/08/2015)", "a": "No, mai", "b": "Si, a condizione che l’attività non preveda la presenza di occupanti, ad esclusione di quella occasionale e di breve durata di personale addetto", "c": "Si, sempre", "correct": "b", "img": null}, {"id": 172, "q": "Le “Classi”, cioè l’intervallo di tempo nel quale è garantito il requisito di resistenza al fuoco del prodotto\\elemento costruttivo", "a": "Sono codificati dalle disposizioni legislative in materia (ES: elementi portanti privi di funzione di compartimento R 15,20,30, 45, 60 ….)", "b": "Sono codificati da progettista della prevenzione incendi", "c": "Sono codificati dal Comando VVF competente territorialmente", "correct": "a", "img": null}, {"id": 173, "q": "Con “carico di incendio” intendiamo:", "a": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio, corretto in base ai parametri indicativi della partecipazione alla combustione dei singoli materiali, espresso in MJ", "b": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano, espresso in MJ/m2", "c": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano (MJ/m2), corretto in base ai parametri indicatori del rischio di incendio del compartimento antincendio e dei fattori relativi alle misure antincendio presenti", "correct": "a", "img": null}, {"id": 174, "q": "Con “carico di incendio specifico” intendiamo:", "a": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio, corretto in base ai parametri indicativi della partecipazione alla combustione dei singoli materiali, espresso in MJ", "b": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano, espresso in MJ/m2", "c": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano (MJ/m2), corretto in base ai parametri indicatori del rischio di incendio del compartimento antincendio e dei fattori relativi alle misure antincendio presenti", "correct": "b", "img": null}, {"id": 175, "q": "Con “carico di incendio specifico di progetto” intendiamo:", "a": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio, corretto in base ai parametri indicativi della partecipazione alla combustione dei singoli materiali, espresso in MJ", "b": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano, espresso in MJ/m2", "c": "potenziale termico netto della totalità dei materiali combustibili contenuti in uno spazio riferito all’unità di superficie lorda di piano (MJ/m2), corretto in base ai parametri indicatori del rischio di incendio del compartimento antincendio e dei fattori relativi alle misure antincendio presenti", "correct": "c", "img": null}, {"id": 176, "q": "Il “carico di incendio” è un parametro fondamentale per la progettazione della sicurezza antincendio", "a": "Si, in particolare il “carico di incendio specifico di progetto” è fondamentale per la progettazione della resistenza al fuoco delle strutture", "b": "Si, è il parametro indicativo del rischio di incendio presente in un luogo di lavoro", "c": "Si, solo nel caso di approccio ingegneristico alla progettazione della sicurezza antincendi", "correct": "a", "img": null}, {"id": 177, "q": "I valori del carico di incendio specifico di progetto adottati nel progetto della prevenzione incendi costituiscono un vincolo d’esercizio per le attività da svolgere all’interno della costruzione", "a": "No, la progettazione della resistenza al fuoco non è influenzata dai valori assunti dal carico di incendio specifico di progetto", "b": "No, in generale, la gestione delle condizioni previste in fase di progetto non influisce sulla sicurezza antincendio", "c": "Si, il mantenimento delle condizioni che hanno determinato il valore del carico di incendio specifico di progetto è un obbligo di esercizio per le attività che vengono svolte nella costruzione", "correct": "c", "img": null}, {"id": 178, "q": "La finalità della misura Esodo (S.4) è quella di", "a": "assicurare che gli occupanti dell’attività possano raggiungere un luogo sicuro o permanere al sicuro, autonomamente o con assistenza, prima che l’incendio determini condizioni incapacitanti negli ambiti dell’attività ove si trovano", "b": "assicurare che gli occupanti dell’attività possano raggiungere un luogo sicuro autonomamente prima che l’incendio determini condizioni incapacitanti negli ambiti dell’attività ove si trovano", "c": "assicurare che gli occupanti dell’attività possano permanere al sicuro prima che l’incendio determini condizioni incapacitanti negli ambiti dell’attività ove si trovano", "correct": "a", "img": null}, {"id": 179, "q": "Il Sistema di Esodo è", "a": "L’insieme delle misure di salvaguardia della vita che consentono agli occupanti di raggiungere un luogo sicuro o permanere al sicuro, autonomamente o con assistenza, prima che l’incendio determini condizioni incapacitanti negli ambiti dell’attività ove si trovano", "b": "L’insieme delle misure di salvaguardia della vita che consentono agli occupanti di raggiungere un luogo sicuro, autonomamente o con assistenza, prima che l’incendio determini il crollo delle strutture", "c": "Il percorso senza ostacoli al deflusso che consente agli occupanti di raggiungere un luogo sicuro dal luogo in cui si trovano", "correct": "a", "img": null}, {"id": 180, "q": "Nell’ambito dell’organizzazione del sistema di esodo, per “Luogo sicuro” intendiamo", "a": "Un luogo in cui è temporaneamente trascurabile il rischio d’incendio per gli occupanti che vi stazionano o vi transitano durante l’esodo", "b": "Un luogo in cui è permanentemente trascurabile il rischio d’incendio per gli occupanti che vi stazionano o vi transitano;", "c": "Uno spazio a “cielo libero” (cortile, ….)", "correct": "b", "img": null}, {"id": 181, "q": "Nell’ambito dell’organizzazione del sistema di esodo, per “Luogo sicuro temporaneo” intendiamo", "a": "Un luogo in cui è temporaneamente trascurabile il rischio d’incendio per gli occupanti che vi stazionano o vi transitano durante l’esodo", "b": "Un luogo in cui è permanentemente trascurabile il rischio d’incendio per gli occupanti che vi stazionano o vi transitano;", "c": "Uno spazio a “cielo libero” (cortile, ….)", "correct": "a", "img": null}, {"id": 182, "q": "Nell’ambito dell’organizzazione del sistema di esodo, per “spazio calmo” intendiamo", "a": "Uno spazio a “cielo libero”", "b": "Un luogo in cui è permanentemente trascurabile il rischio d’incendio per gli occupanti che vi stazionano o vi transitano;", "c": "luogo sicuro temporaneo ove gli occupanti possono attendere e ricevere assistenza per completare l’esodo verso luogo sicuro", "correct": "c", "img": null}, {"id": 183, "q": "Nell’ambito dell’organizzazione del sistema di esodo, per “via di esodo” intendiamo", "a": "Un qualunque percorso, a prescindere dalla geometria, che adduce dall’interno dell’edificio all’esterno", "b": "Un percorso a prova di fumo rispetto al compartimento servito, che adduce dall’interno all’esterno", "c": "Un percorso senza ostacoli al deflusso, appartenente al sistema d’esodo, che consente agli occupanti di raggiungere un luogo sicuro dal luogo in cui si trovano", "correct": "c", "img": null}, {"id": 184, "q": "Nell’ambito dell’organizzazione del sistema di esodo, per “corridoio cieco” intendiamo", "a": "Una porzione di via d’esodo da cui è possibile l’esodo in un’unica direzione", "b": "Una porzione di via d’esodo nella quale non sono realizzate aperture di aerazione e illuminazione naturale", "c": "Un percorso senza ostacoli al deflusso, appartenente al sistema d’esodo, che consente agli occupanti di raggiungere un luogo sicuro dal luogo in cui si trovano", "correct": "a", "img": null}, {"id": 185, "q": "Nell’ambito dell’organizzazione del sistema di esodo, le modalità di esodo da un’opera di costruzione possono essere diverse", "a": "Si, esodo simultaneo, esodo per fasi, esodo orizzontale progressivo ovvero protezione sul posto", "b": "No, in caso di incendio gli occupanti devono spostarti obbligatoriamente tutti verso un luogo sicuro", "c": "No, in caso di incendio gli occupanti devono spostarti obbligatoriamente tutti dal compartimento di primo innesco in un compartimento adiacente", "correct": "a", "img": null}, {"id": 186, "q": "Nell’ambito dell’organizzazione del sistema di esodo, l’ “esodo simultaneo” da un’opera di costruzione è", "a": "modalità di esodo che prevede lo spostamento contemporaneo degli occupanti fino a luogo sicuro.", "b": "modalità di esodo di una struttura organizzata con più compartimenti, in cui l’evacuazione degli occupanti fino a luogo sicuro avviene in successione dopo l’evacuazione del compartimento di primo innesco", "c": "modalità di esodo che prevede lo spostamento degli occupanti dal compartimento di primo innesco in un compartimento adiacente capace di contenerli e proteggerli fino a quando l’incendio non sia estinto o fino a che non si proceda ad una successiva evacuazione fino a luogo sicuro", "correct": "a", "img": null}, {"id": 187, "q": "Nell’ambito dell’organizzazione del sistema di esodo, l’“esodo per fasi” da un’opera di costruzione è", "a": "modalità di esodo che prevede lo spostamento contemporaneo degli occupanti fino a luogo sicuro.", "b": "modalità di esodo di una struttura organizzata con più compartimenti, in cui l’evacuazione degli occupanti fino a luogo sicuro avviene in successione dopo l’evacuazione del compartimento di primo innesco", "c": "modalità di esodo che prevede lo spostamento degli occupanti dal compartimento di primo innesco in un compartimento adiacente capace di contenerli e proteggerli fino a quando l’incendio non sia estinto o fino a che non si proceda ad una successiva evacuazione fino a luogo sicuro", "correct": "b", "img": null}, {"id": 188, "q": "Nell’ambito dell’organizzazione del sistema di esodo, l’“esodo orizzontale progressivo” da un’opera di costruzione è", "a": "modalità di esodo che prevede lo spostamento contemporaneo degli occupanti fino a luogo sicuro.", "b": "modalità di esodo di una struttura organizzata con più compartimenti, in cui l’evacuazione degli occupanti fino a luogo sicuro avviene in successione dopo l’evacuazione del compartimento di primo innesco", "c": "modalità di esodo che prevede lo spostamento degli occupanti dal compartimento di primo innesco in un compartimento adiacente capace di contenerli e proteggerli fino a quando l’incendio non sia estinto o fino a che non si proceda ad una successiva evacuazione fino a luogo sicuro", "correct": "c", "img": null}, {"id": 189, "q": "Nell’ambito dell’organizzazione del sistema di esodo, la “protezione sul posto” è", "a": "modalità di esodo che prevede lo spostamento contemporaneo degli occupanti fino a luogo sicuro.", "b": "modalità di esodo di una struttura organizzata con più compartimenti, in cui l’evacuazione degli occupanti fino a luogo sicuro avviene in successione dopo l’evacuazione del compartimento di primo innesco", "c": "modalità di esodo che prevede la protezione degli occupanti nell’ambito in cui si trovano", "correct": "c", "img": null}, {"id": 190, "q": "Secondo il D.M. 3 agosto 2015 (Codice di Prevenzione Incendi), la pubblica via può essere qualificata come “luogo sicuro” ai fini dell’esodo?", "a": "Non sempre, dipende dalla larghe ll}, {"id": 205, "q": "Secondo il D.M. 3 agosto 2015 (Codice di Prevenzione Incendi), gli eventuali corridoi ciechi presenti in un luogo di lavoro devono essere di lunghezza limitata, in funzione del rischio di incendio dell’attività?", "a": "Si, a seconda del profilo di rischio dell’attività, le lunghezze possono avere valori massimi fra 10 e 45 metri", "b": "No, le lunghezze devono essere limitate solo in presenza di elevati affollamenti", "c": "No, le lunghezze delle vie di esodo, compresi i corridoi ciechi, possono essere di qualunque valore a prescindere dal rischio dell’attività", "correct": "a", "img": null}, {"id": 206, "q": "In un luogo con affollamento dell’ambito servito maggiore di 1000 occupanti, la larghezza della via di esodo orizzontale deve essere maggiore o uguale a 1200 mm (1,2 m)", "a": "Si, a prescindere dal numero di vie di esodo disponibili", "b": "No, la larghezza è definita dal progettista sulla base dell’affollamento e del numero di uscite", "c": "Si, solo se in presenza di percorso di esodo unidirezionale (corridoio cieco)", "correct": "b", "img": null}, {"id": 207, "q": "In un sistema di esodo sono consentite larghezze minime delle vie di esodo orizzontali maggiori o uguali a 800 mm (80 cm)", "a": "Si, a condizione che l’affollamento dell’ambito servito non sia elevato, massimo 50 occupanti", "b": "No, mai, le vie di esodo devono essere sempre almeno uguali o maggiori di 1,20 m, a prescindere dall’affollamento", "c": "Si, solo se in presenza di percorso di esodo alternativi", "correct": "a", "img": null}, {"id": 208, "q": "In un luogo con affollamento dell’ambito servito maggiore di 1000 occupanti, la larghezza della via di esodo verticali deve essere maggiore o uguale a 1200 mm (1,20 m)", "a": "Si, a prescindere dal numero di vie di esodo disponibili", "b": "No, la larghezza è definita dal progettista sulla base dell’affollamento e del numero di uscite", "c": "Si, solo se in presenza di percorso di esodo unidirezionale (corridoio cieco)", "correct": "b", "img": null}, {"id": 209, "q": "In un sistema di esodo sono consentite larghezze minime delle vie di esodo verticali maggiori o uguali a 900 mm (90 cm)", "a": "Si, a condizione che l’affollamento dell’ambito servito non sia molto elevato, massimo 300 occupanti", "b": "No, mai, le vie di esodo devono essere sempre almeno uguali o maggiori di 1,20 m, a prescindere dall’affollamento", "c": "Si, solo se in presenza di percorso di esodo alternativi", "correct": "a", "img": null}, {"id": 210, "q": "Le vie di esodo devono avere un’altezza minima di 2 metri", "a": "Si, ad eccezione di brevi tratti segnalati di vie di esodo utilizzabili esclusivamente da personale specificamente formato ovvero utilizzate occasionalmente da un numero limitato di occupanti", "b": "No, l’altezza la stabilisce il progettista sulla base della valutazione del rischio", "c": "Si, solo se in presenza di elevati affollamenti", "correct": "a", "img": null}, {"id": 211, "q": "Nella progettazione del sistema di esodo, in caso di piani nei quali vi può essere presenza non occasionale di occupanti che non abbiano sufficienti abilità per raggiungere autonomamente un luogo sicuro tramite vie di esodo verticali devono essere adottate specifiche modalità di gestione dell’esodo:", "a": "Si, deve essere adottata almeno una delle seguenti modalità: spazi calmi, esodo orizzontale progressivo o esodo orizzontale verso luogo sicuro", "b": "No, il progettista può decidere di organizzare l’esodo mediante squadre appositamente dedicate alle persone che non abbiano sufficienti abilità per raggiungere autonomamente un luogo sicuro tramite vie di esodo verticali", "c": "No, solo se prescritte dai vigili del fuoco", "correct": "a", "img": null}, {"id": 212, "q": "La misura antincendio “Rilevazione ed allarme” ha come obiettivo la sorveglianza degli ambiti di un’attività, rilevare precocemente un incendio e diffondere l’allarme al fine di", "a": "attivare le misure protettive (es. impianti automatici estinzione, ripristino della compartimentazione, evacuazione di fumi e calore, …);", "b": "attivare le misure gestionali (es. piano e procedure di emergenza e di esodo, …) progettate e programmate in relazione all’incendio rivelato ed all’ambito ove tale principio di incendio si è sviluppato rispetto all’intera attività sorvegliata", "c": "Attivare sia le misure protettive sia le misure gestionali indicate negli altri due punti", "correct": "c", "img": null}, {"id": 213, "q": "Gli impianti di rivelazione incendio e segnalazione allarme incendio (IRAI) sono", "a": "Impianti in grado di rivelare un incendio quanto prima possibile e di segnalare l’allarme al fine di attivare le misure antincendio tecniche (impianti automatici di controllo o estinzione dell’incendio, compartimentazione, evacuazione dei fumi e del calore, …) e procedurali (piano e procedure di emergenza e di esodo, …)", "b": "Impianti in grado di rivelare un incendio quanto prima possibile e di segnalare l’allarme al fine di attivare le misure antincendio tecniche (impianti automatici di controllo o estinzione dell’incendio, compartimentazione, evacuazione dei fumi e del calore, …)", "c": "Impianti in grado di rivelare un incendio quanto prima possibile e di segnalare l’allarme al fine di attivare le misure procedurali (piano e procedure di emergenza e di esodo, …)", "correct": "a", "img": null}, {"id": 214, "q": "La rivelazione e la diffusione dell’allarme incendio possono essere demandate solo alla sorveglianza da parte degli occupanti", "a": "Si, ove valutazione del rischio non evidenzi particolari e significativi rischi di incendio, a condizione che siano codificate idonee procedure finalizzate al rapido e sicuro allertamento degli occupanti in caso di incendio, da inserire nel piano di emergenza", "b": "No, mai", "c": "Si, solo se l’affollamento non supera i 10 occupanti", "correct": "a", "img": null}, {"id": 215, "q": "Secondo il D.M. 3 agosto 2015 (Codice di Prevenzione Incendi), i punti di segnalazione manuale a servizio di un Impianto di Rilevazione e Allarme Incendio (IRAI)", "a": "devono essere raggiungibili mediante percorsi compresi tra i 15 e i 30 m, individuati in relazione al rischio incendio", "b": "devono essere posti in corrispondenza dell’uscita di esodo principale", "c": "devono essere posti nella zona dove lavora il coordinatore degli addetti antincendio", "correct": "a", "img": null}, {"id": 216, "q": "I punti di segnalazione manuale a servizio di un Impianto di Rilevazione e Allarme Incendio (IRAI)", "a": "devono essere installati in posizione ben visibile e segnalata ed essere facilmente accessibili", "b": "devono essere posti in corrispondenza dell’uscita di esodo principale", "c": "devono essere posti nella zona dove lavora il coordinatore degli addetti antincendio", "correct": "a", "img": null}, {"id": 217, "q": "I punti di segnalazione manuale a servizio di un Impianto di Rilevazione e Allarme Incendio (IRAI), per consentire a tutti gli occupanti, anche a quelli che impiegano ausili di movimento, di inviare l’allarme d’incendio", "a": "dovrebbero essere collocati ad una quota pari a circa 110 cm dal piano di calpestio.", "b": "dovrebbero sempre essere collocati negli eventuali spazi calmi, se previsti.", "c": "dovrebbero essere collocati ad una quota non superiore di 50 cm dal piano di calpestio.", "correct": "a", "img": null}, {"id": 218, "q": "La progettazione della misura antincendio “Controllo Fumo e Calore” ha come scopo", "a": "l’individuazione dei presidi antincendio da installare nell’attività per consentire solo l’evacuazione o lo smaltimento dei prodotti della combustione in caso di incendio", "b": "l’individuazione dei presidi antincendio da installare nell’attività per consentire il controllo, l’evacuazione o lo smaltimento dei prodotti della combustione in caso di incendio", "c": "l’individuazione dei presidi antincendio da installare nell’attività per consentire solo il controllo dei prodotti della combustione in caso di incendio", "correct": "b", "img": null}, {"id": 219, "q": "Il “Controllo Fumo e Calore” si attua attraverso la realizzazione di:", "a": "aperture di smaltimento di fumo e calore d’emergenza, sistemi di ventilazione orizzontale forzata del fumo e del calore (SVOF) e sistemi per l’evacuazione di fumo e calore (SEFC)", "b": "Solo attraverso smaltimento di fumo e calore d’emergenza, sistemi di ventilazione orizzontale forzata del fumo e del calore (SVOF)", "c": "Solo attraverso sistemi per l’evacuazione di fumo e calore (SEFC)", "correct": "a", "img": null}, {"id": 220, "q": "Lo smaltimento di fumo e calore di emergenza verso l’esterno di un edificio può essere realizzato per mezzo di aperture già ordinariamente disponibili per la funzionalità dell’attività (es. finestre, lucernari, porte, …)", "a": "Si", "b": "No, solo attraverso sistemi di ventilazione orizzontale forzata del fumo e del calore (SVOF)", "c": "No, solo attraverso specifici sistemi per l’evacuazione di fumo e calore (SEFC)", "correct": "a", "img": null}, {"id": 221, "q": "Le aperture di smaltimento realizzate per lo smaltimento dei fumi e calore di emergenza devono essere gestite e in particolare protette dall’ostruzione accidentale durante l’esercizio dell’attività", "a": "Si, sempre in quanto sono parte integrante di una misura antincendio progettata per mitigare il rischio incendio dell’attività", "b": "No, perché in caso di emergenza l’ostruzione può essere sempre eliminata", "c": "No, perché la realizzazione delle aperture di smaltimento dei fumi e calore di emergenza sono una misura consigliata ma non necessaria ai fini della sicurezza antincendio di un’attività", "correct": "a", "img": null}, {"id": 222, "q": "Lo smaltimento di fumo e calore d’emergenza ha la sola funzione di facilitare l’opera di estinzione dei soccorritori", "a": "Si,", "b": "No, anche di garantire che le vie di esodo siano libere dai prodotti della combustione durante l’evacuazione", "c": "No, hanno lo scopo di impedire la realizzazione delle condizioni di flash over (incendio generalizzato)", "correct": "b", "img": null}, {"id": 223, "q": "Le aperture di smaltimento individuate nella progettazione dello smaltimento di fumo e calore d’emergenza possono essere solo di tipo “permanentemente aperte”", "a": "No, fatte salve particolari condizioni di elevati carichi di incendio, possono essere anche di altra tipologia: aperture dotate di sistema automatico di apertura (attivazione da impianto di rivelazione e allarme incendio), con infissi comandati da posizione protetta e segnalata, con infissi comandanti da posizione non protetta, con chiusura bassofondente", "b": "Si, in alternativa si deve realizzare un impianto automatico di estrazione fumi e calore", "c": "No, in alternativa possono essere istallate solo aperture dotate di sistema automatico di apertura (attivazione da impianto di rivelazione e allarme incendio)", "correct": "a", "img": null}, {"id": 224, "q": "Le aperture di smaltimento individuate nella progettazione dello smaltimento di fumo e calore d’emergenza devono essere uniformemente distribuite nel compartimento servito e preferibilmente poste nella porzione superiore dei locali", "a": "Si, al fine di facilitare lo smaltimento dei fumi e gas caldi", "b": "No, è sufficiente che ci siano aperture di superficie adeguata, a prescindere dalla posizione", "c": "No, è preferibile che le aperture siano nella porzione inferiore dei locali", "correct": "a", "img": null}, {"id": 225, "q": "I Sistemi di ventilazione forzata orizzontale del fumo e del calore (SVOF), svolgono la funzione di smaltimento di fumo e calore d’emergenza", "a": "Si, come le aperture di smaltimento, possono facilitare l’opera di estinzione dei soccorritori, fornendo condizioni favorevoli per le squadre di soccorso da un punto di accesso sino alla posizione dell’incendio", "b": "No, hanno lo scopo di garantire, per un determinato intervallo di tempo, un’adeguata altezza libera dai fumi in caso di incendio nel compartimento di innesco", "c": "No, hanno lo scopo di impedire, per un determinato intervallo di tempo, la formazione delle condizioni di “flash over” (incendio generalizzato) nel compartimento di innesco", "correct": "a", "img": null}, {"id": 226, "q": "I Sistemi di evacuazione del fumo e del calore (SEFC)", "a": "creano e mantengono uno strato d’aria sostanzialmente indisturbato nella porzione inferiore dell’ambiente protetto mediante l’evacuazione di fumo e calore prodotti dall’incendio", "b": "hanno lo scopo di facilitare l’opera di estinzione dei soccorritori, fornendo condizioni favorevoli per le squadre di soccorso da un punto di accesso sino alla posizione dell’incendio", "c": "hanno lo scopo agevolare lo smaltimento di fumo e calore dall’attività dopo l’incendio, ripristinando rapidamente le condizioni di sicurezza.", "correct": "a", "img": null}, {"id": 227, "q": "I Sistemi di evacuazione del fumo e del calore (SEFC), fra i diversi obiettivi, hanno anche quello di mantenere le vie di esodo libere da fumo e calore", "a": "Si, poiché creano e mantengono uno strato d’aria sostanzialmente indisturbato nella porzione inferiore dell’ambiente protetto mediante l’evacuazione di fumo e calore prodotti dall’incendio", "b": "No, hanno solo lo scopo di facilitare l’opera di estinzione dei soccorritori, fornendo condizioni favorevoli per le squadre di soccorso da un punto di accesso sino alla posizione dell’incendio", "c": "No, hanno solo lo scopo agevolare lo smaltimento di fumo e calore dall’attività dopo l’incendio, ripristinando rapidamente le condizioni di sicurezza.", "correct": "a", "img": null}, {"id": 228, "q": "I Sistemi di evacuazione del fumo e del calore (SEFC), fra i diversi obiettivi, hanno anche quello di ritardare o prevenire il flashover e quindi la generalizzazione dell’incendio", "a": "Si, poiché creano e mantengono uno strato d’aria sostanzialmente indisturbato nella porzione inferiore dell’ambiente protetto mediante l’evacuazione di fumo e calore prodotti da i di incendio di classe A  o classe B", "a": "è opportuno l’utilizzo di estintori a base d’acqua (estintori idrici).", "b": "è opportuno l’utilizzo di estintori a polvere", "c": "è opportuno l’utilizzo di estintori ad anidride carbonica", "correct": "a", "img": null}, {"id": 250, "q": "Gli estintori devono essere sempre disponibili per l’uso immediato", "a": "Si, pertanto devono essere collocati in posizione facilmente visibile e raggiungibile, lungo i percorsi d’esodo in prossimità delle uscite dei locali, di piano o finali, ed in prossimità delle aree a rischio specifico", "b": "No, poiché sono utilizzati dagli addetti antincendio devono essere posti in prossimità dei locali dove sono presenti gli addetti", "c": "No, è sufficiente che siano collocati in un qualunque locale del luogo di lavoro", "correct": "a", "img": null}, {"id": 251, "q": "Gli estintori di classe A devono essere installati in modo da non superare le massime distanza di raggiungimento indicate nelle norme di prevenzione incendi", "a": "Si, le massime distanze di installazione variano fra i 20 e 40 metri in funzione del rischio di incendio al quale sono esposte le persone (Rvita)", "b": "No, poiché sono utilizzati dagli addetti antincendio devono essere posti in prossimità dei locali dove sono presenti gli addetti", "c": "No, è sufficiente che siano collocati in un qualunque locale del luogo di lavoro", "correct": "a", "img": null}, {"id": 252, "q": "Gli estintori di classe B devono essere posizionati a distanza non superiore a 15 m rispetto alle sorgenti di rischio (es: deposito di liquidi infiammabili)", "a": "Si,", "b": "No, poiché sono utilizzati dagli addetti antincendio devono essere posti in prossimità dei locali dove sono presenti gli addetti", "c": "No, è sufficiente che siano collocati in un qualunque locale del luogo di lavoro", "correct": "a", "img": null}, {"id": 253, "q": "Per consentire a tutti gli occupanti di impiegare gli estintori per rispondere immediatamente ad un principio di incendio le impugnature dei presidi manuali dovrebbero essere collocate", "a": "ad una quota pari a circa 110 cm dal piano di calpestio", "b": "ad una quota pari a circa 50 cm dal piano di calpestio", "c": "ad una quota non superiore a 200 cm dal piano di calpestio", "correct": "a", "img": null}, {"id": 254, "q": "Gli estintori devono essere sempre disponibili per l’uso immediato e la loro posizione deve essere sempre segnalata con opportuni segnali di sicurezza", "a": "Si, in particolare la segnaletica dovrà indicare la tipologia di estintore (portatile o carrellato)", "b": "No, poiché sono utilizzati dagli addetti antincendio non è necessario segnalarli", "c": "No, è sufficiente che siano indicati nella planimetria affissa nei locali del luogo di lavoro", "correct": "a", "img": null}, {"id": 255, "q": "Con il seguente segnale di sicurezza indichiamo", "a": "Il punto di installazione di un estintore portatile", "b": "Il punto di installazione di un estintore carrellato", "c": "Il locale del luogo di lavoro nel quale sono collocati tutti gli estintori per affrontare un principio di incendio", "correct": "a", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz4KICA8cmVjdCB3aWR0aD0nMTAwJyBoZWlnaHQ9JzEwMCcgcng9JzQnIGZpbGw9JyNjYzAwMDAnLz4KICA8cmVjdCB4PSc0MCcgeT0nMjInIHdpZHRoPScyMCcgaGVpZ2h0PScxMCcgcng9JzMnIGZpbGw9J3doaXRlJy8+CiAgICAgICA8cmVjdCB4PSc0MicgeT0nMzInIHdpZHRoPScxNicgaGVpZ2h0PSc0MCcgcng9JzQnIGZpbGw9J3doaXRlJy8+CiAgICAgICA8ZWxsaXBzZSBjeD0nNTAnIGN5PSc3Micgcng9JzEwJyByeT0nNScgZmlsbD0nd2hpdGUnLz4KICAgICAgIDxyZWN0IHg9JzI1JyB5PSczMycgd2lkdGg9JzE1JyBoZWlnaHQ9JzQnIHJ4PScyJyBmaWxsPSd3aGl0ZScvPgogICAgICAgPGxpbmUgeDE9JzI1JyB5MT0nMzUnIHgyPScxNScgeTI9JzQ4JyBzdHJva2U9J3doaXRlJyBzdHJva2Utd2lkdGg9JzMnIHN0cm9rZS1saW5lY2FwPSdyb3VuZCcvPgo8L3N2Zz4="}, {"id": 256, "q": "Con il seguente segnale di sicurezza indichiamo", "a": "Il punto di installazione di un estintore portatile", "b": "Il punto di installazione di un e
