ssoso", "correct": "b", "img": null}, {"id": 264, "q": "Un impianto automatico a pioggia sprinkler", "a": "Serve ad estinguere definitivamente l’incendio, anche se si è diffuso all’intero locale servito", "b": "serve ad assicurare una pronta risposta all’incendio rivelandone la presenza e controllandolo in modo che l'estinzione possa essere completata con altri mezzi, oppure estinguendolo nello stadio iniziale", "c": "serve ad assicurare una pronta risposta all’incendio rivelandone la presenza", "correct": "b", "img": null}, {"id": 265, "q": "Gli ugelli regolatori distribuiti sull’area protetta dagli impianti a pioggia sprinkler", "a": "Sono tutti aperti, all’attivazione dell’allarme viene erogata acqua contemporaneamente in tutto il locale protetto", "b": "Sono chiusi con elementi che ad una data temperatura (termosensibili) si “rompono” consentendo all’acqua di uscire", "c": "Sono chiusi con elementi che si “rompono” alla temperatura di progetto, che è sempre di 200 °C", "correct": "b", "img": null}, {"id": 266, "q": "Un impianto automatico a diluvio", "a": "serve ad assicurare una pronta risposta all’incendio rivelandone la presenza e controllandolo in modo che l'estinzione possa essere completata con altri mezzi, oppure estinguendolo nello stadio iniziale", "b": "è un sistema fisso di protezione antincendio che inonda totalmente l'area con acqua sotto pressione, attraverso un sistema di tubazioni e di erogatori sprinkler privi del tappo e dell'elemento termosensibile", "c": "serve ad assicurare una pronta risposta all’incendio rivelandone la presenza", "correct": "b", "img": null}, {"id": 267, "q": "Negli impianti automatici a diluvio le tubazioni sono vuote e l'acqua è mantenuta a monte di un'apposita valvola a diluvio la cui apertura è comandata da un sistema di rivelazione incendi scaricando l'acqua contemporaneamente da tutti gli erogatori", "a": "No, le tubazioni sono piene è l’acqua è scaricata solo nell’area in cui gli elementi termosensibili si aprono e consentono all’acqua si uscire", "b": "Si", "c": "Gli impianti a diluvio non esisitono", "correct": "b", "img": null}, {"id": 268, "q": "La progettazione della misura antincendio “Operatività Antincendio” ha lo scopo di:", "a": "agevolare l’efficace conduzione di interventi di soccorso dei Vigili del fuoco in tutte le attività", "b": "agevolare l’efficace azione delle “addetti alla gestione dell’emergenza” aziendali in tutte le attività", "c": "Agevolare l’efficace azione dei soccorsi sanitari in tutte le attività", "correct": "a", "img": null}, {"id": 269, "q": "Ai fini della mitigazione del rischio incendio, è sempre necessario, in relazione al rischio valutato, progettare soluzioni tecniche che agevolino l’efficace conduzione di interventi di soccorso dei Vigili del fuoco", "a": "No, l’agevolazione dell’attività di soccorso dei Vigili del Fuoco non rientra fra i requisiti da garantire al fine di minimizzare il rischio incendio e raggiungere gli obiettivi di sicurezza primaria della prevenzione incendi", "b": "Si, l’agevolazione dell’attività di soccorso dei Vigili del Fuoco rientra fra i requisiti da garantire al fine di minimizzare il rischio incendio e raggiungere gli obiettivi di sicurezza primaria della prevenzione incendi", "c": "No, le misure finalizzate all’agevolazione dell’attività di soccorso dei Vigili del Fuoco non si progettano con l’applicazione del “Codice” ma concordandole con il locale Comando VVF", "correct": "b", "img": null}, {"id": 270, "q": "Tra le misure di “Operatività Antincendio” rientra l’accessibilità per mezzi di soccorso antincendio,", "a": "Si, al fine di agevolare gli interventi dei VVF, generalmente deve essere garantita la possibilità di avvicinare i mezzi di soccorso a distanza  50 m dagli accessi dell’attività", "b": "No, l’importante che i mezzi possano arrivare tramite la pubblica il più vicino possibile al luogo dell’intervento, a prescindere dalla distanza degli accessi all’attività", "c": "No, l’accessibilità per i mezzi di soccorso all’attività non influisce sulla mitigazione del rischio di incendio dell’attività", "correct": "a", "img": null}, {"id": 271, "q": "Tra le misure di “Operatività Antincendio” rientra la pronta disponibilità di agenti estinguenti", "a": "Si, ed è attuabile nei seguenti modi: rete idranti con protezione interna o, in alternativa, per attività a più piani fuori terra, tramite colonna a secco e rete idranti con protezione esterna o presenza di almeno un idrante, derivato dalla rete interna oppure collegato alla rete pubblica, raggiungibile con un percorso massimo di 500 m dai confini dell’attività", "b": "No, i Vigili del Fuoco che intervengono hanno sui loro mezzi gli agenti estinguenti sufficienti a fronteggiare tempestivamente ed efficacemente qualunque tipo di incendio", "c": "No, la pronta disponibilità di agenti estinguenti non influisce sulla mitigazione del rischio di incendio dell’attività", "correct": "a", "img": null}, {"id": 272, "q": "Tra le misure di “Operatività Antincendio” rientra la possibilità di controllare o arrestare gli impianti tecnologici e di servizio dell’attività, compresi gli impianti di sicurezza", "a": "Si, e si attua, ad esempio, mediante l’ubicazione dei sistemi di controllo e comando dei servizi di sicurezza destinati a funzionare in caso di incendio in posizione segnalata e facilmente raggiungibile durante l’incendio", "b": "No, i Vigili del Fuoco che intervengono hanno i dispositivi di protezione individuale grazie ai quali possono raggiungere ogni area dell’attività e controllare o arrestare gli impianti dell’attività", "c": "No, la possibilità di controllare o arrestare gli impianti tecnologici e di servizio dell’attività, compresi gli impianti di sicurezza non influisce sulla mitigazione del rischio di incendio dell’attività", "correct": "a", "img": null}, {"id": 273, "q": "Tra le misure di “Operatività Antincendio” rientra l’accessibilità protetta per i vigili del fuoco a tutti i piani dell’attività", "a": "Si, e si attua, ad esempio, tramite accostabilità a tutti i piani dell’autoscala o di mezzo equivalente dei vigili del fuoco", "b": "No, i Vigili del Fuoco che intervengono hanno i dispositivi di protezione individuale grazie ai quali possono raggiungere ogni area dell’attività e operare contro l’incendio", "c": "No, l’accessibilità protetta per i vigili del fuoco a tutti i piani dell’attività non influisce sulla mitigazione del rischio di incendio dell’attività", "correct": "a", "img": null}, {"id": 274, "q": "L’ascensore antincendio è", "a": "un ascensore installato principalmente per uso degli occupanti, munito però di ulteriori protezioni, comandi e segnalazioni che lo rendono in grado di essere impiegato, sotto il controllo delle squadre di soccorso, anche in caso di incendio", "b": "un ascensore utilizzabile in caso di incendio, installato esclusivamente per il trasporto delle attrezzature di servizio antincendio ed eventualmente, per l’evacuazione di emergenza degli occupanti", "c": "un ascensore protetto da impianti automatici di spegnimento", "correct": "a", "img": null}, {"id": 275, "q": "L’ascensore di soccorso è", "a": "un ascensore installato principalmente per uso degli occupanti, munito però di ulteriori protezioni, comandi e segnalazioni che lo rendono in grado di essere impiegato, sotto il controllo delle squadre di soccorso, anche in caso di incendio", "b": "un ascensore utilizzabile in caso di incendio, installato esclusivamente per il trasporto delle attrezzature di servizio antincendio ed eventualmente, per l’evacuazione di emergenza degli occupanti", "c": "un ascensore protetto da impianti automatici di spegnimento", "correct": "b", "img": null}, {"id": 276, "q": "La Gestione della Sicurezza Antincendio è la misura di sicurezza antincendio", "a": "finalizzata alla gestione di un’attività in condizioni di sicurezza, sia in fase di esercizio che in fase di emergenza, attraverso l’adozione di una organizzazione che prevede ruoli, compiti, responsabilità e procedure", "b": "finalizzata solo alla gestione di un’attività in condizioni di sicurezza in fase di esercizio, attraverso l’adozione di una organizzazione che prevede ruoli, compiti, responsabilità e procedure", "c": "non è una misura di sicurezza antincendio ma una strategia", "correct": "a", "img": null}, {"id": 277, "q": "la finalità della misura Gestione della Sicurezza Antincendio (GSA)", "a": "È di garantire, nel tempo, un adeguato livello di sicurezza in caso di incendio", "b": "E’ di garantire nel tempo un adeguato livello di manutenzione delle attrezzature e impianti antincendio", "c": "E’ di garantire nel tempo una adeguato livello di affidabilità degli impianti di protezione attiva a disponibilità superiore", "correct": "a", "img": null}, {"id": 278, "q": "La gestione della sicurezza antincendio (GSA) si divide nei due aspetti: gestione della sicurezza antincendio in esercizio e gestione della sicurezza antincendio in emergenza", "a": "Si", "b": "No, solo gestione della sicurezza antincendio in esercizio", "c": "No, solo gestione della sicurezza antincendio in emergenza", "correct": "a", "img": null}, {"id": 279, "q": "La gestione della sicurezza antincendio (GSA) in esercizio deve comprendere", "a": "Tutte le azioni previste negli altre due punti", "b": "L’adozione e verifica periodica delle misure antincendio preventive, l’apposizione della segnaletica di sicurezza (divieti, avvertimenti, evacuazione,…), la verifica dell’osservanza dei divieti, delle limitazioni e delle condizioni di esercizio ed il controllo e la manutenzione di impianti e attrezzature antincendio e la compilazione registro dei controlli", "c": "La preparazione alla gestione dell’emergenza, tramite piano di emergenza, formazione e addestramento degli addetti alla gestione dell’emergenza, esercitazioni antincendio e prove d’evacuazione periodiche e la gestione delle condizioni di maggior rischio (lavori di manutenzione, rischi di interferenza, disattivazione di impianti o sistemi di sicurezza, impiego", "correct": "a", "img": null}, {"id": 280, "q": "La gestione della sicurezza antincendio (GSA) in emergenza riguarda", "a": "l’attivazione e l’attuazione del piano di emergenza.", "b": "L’adozione e verifica periodica delle misure antincendio preventive, l’apposizione della segnaletica di sicurezza (divieti, avvertimenti, evacuazione,), la verifica dell’osservanza dei divieti, delle limitazioni e delle condizioni di esercizio ed il controllo e la manutenzione di impianti e attrezzature antincendio e la compilazione registro dei controlli", "c": "La preparazione alla gestione dell’emergenza, tramite piano di emergenza, formazione e addestramento degli addetti alla gestione dell’emergenza, esercitazioni antincendio e prove d’evacuazione periodiche e la gestione delle condizioni di maggior rischio (lavori di manutenzione, rischi di interferenza, disattivazione di impianti o sistemi di sicurezza, impiego", "correct": "a", "img": null}, {"id": 281, "q": "Gli addetti al servizio antincendio", "a": "attuano le misure antincendio in esercizio e in emergenza, con le modalità stabilite dal datore di lavoro nei documenti della Gestione della Sicurezza Antincendio (GSA) e nel piano di emergenza", "b": "Attuano solo le misure antincendio in emergenza, con le modalità stabilite dal datore di lavoro nel piano di emergenza", "c": "Attuano solo le misure antincendio in esercizio, con le modalità stabilite dal datore di lavoro nei documenti della Gestione della Sicurezza Antincendio (GSA)", "correct": "a", "img": null}, {"id": 282, "q": "Gli addetti al servizio antincendio, in condizione ordinarie (gestione sicurezza antincendio – GSA -  in esercizio)", "a": "attuano le misure antincendio in esercizio, in particolare: attuano le misure antincendio preventive; garantiscono la fruibilità delle vie di esodo; svolgono le attività di sorveglianza dei presidi antincendio", "b": "Attuano le misure antincendio in emergenza, in particolare: mettono in atto le azioni previste  qualunque modo per avvisare tutti", "c": "dare l’allarme al Datore di Lavoro che deciderà cosa fare", "correct": "a", "img": null}, {"id": 299, "q": "I lavoratori, in caso di emergenza incendio", "a": "Devono seguire le indicazioni del piano di emergenza redatte dal Datore di Lavoro", "b": "Intervenire nel luogo interessato cercando di spegnere in ogni modo l’incendio", "c": "Devono allontanarsi dal luogo di lavoro, il più velocemente possibile e con qualunque modalità", "correct": "a", "img": null}, {"id": 300, "q": "Il datore di lavoro, oltre alla predisposizione del sistema d’esodo, nel piano di emergenza deve predisporre le procedure per consentire l’evacuazione dell’attività", "a": "Si,", "b": "No, e sufficiente che il datore di lavoro identifichi le vie di esodo con idonea segnaletica di sicurezza", "c": "No, è sufficiente che il datore di lavoro indichi le vie di esodo nelle planimetrie apposte nell’attività", "correct": "a", "img": null}, {"id": 301, "q": "Nell’attuazione delle procedure di evacuazione gli addetti antincendio", "a": "svolgono un ruolo fondamentale assicurando e sovraintendendo il corretto svolgimento delle procedure di evacuazione", "b": "Non sono chiamati a svolgere alcun ruolo poiché le procedure di evacuazione sono già a conoscenza di tutti i lavoratori", "c": "Non sono chiamati a svolgere alcun ruolo poiché il loro compito è solo chiamare i soccorsi esterni e tentare di spegnere l’incendio", "correct": "a", "img": null}, {"id": 302, "q": "Nell’attuazione delle procedure di evacuazione, le azioni e le attività che devono svolgere gli addetti antincendio sono", "a": "Accertarsi che le uscite di sicurezza siano fruibili nonché tutte le altre azioni indicate negli altri due punti", "b": "sorvegliare la corretta evacuazione delle persone, accertarsi che nessun occupante abbia problemi a raggiungere l'uscita, assistere le persone con specifiche necessità (disabili, …) fino al raggiungimento del punto di raccolta", "c": "riunire gli occupanti let activeTab='home',studioSearch='',studioFilter='all',studioOpen={};
let history_=JSON.parse(localStorage.getItem('vvf_hist')||'[]');
let E=null;

// Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('inst-bar').style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('inst-bar').style.display='none';deferredPrompt=null;
});
document.getElementById('inst-btn').onclick=()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('inst-bar').style.display='none';});
};
document.getElementById('inst-close').onclick=()=>document.getElementById('inst-bar').style.display='none';

const $app=()=>document.getElementById('app');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r;}
function toast(m,ms=2200){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function fmtTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function savehist(){localStorage.setItem('vvf_hist',JSON.stringify(history_));}
function imgHtml(q,cls='q-img-wrap'){return q.img?`<div class="${cls}"><img src="${q.img}" alt="Cartello Q.${q.id}"></div>`:''; }

function showTab(tab){
  activeTab=tab;
  ['home','esame','studio'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  if(tab==='home')renderHome();else if(tab==='esame')renderExam();else renderStudio();
}

function renderHome(){
  const best=history_.length?Math.max(...history_.map(h=>h.score)):null;
  const recent=[...history_].reverse().slice(0,5);
  const histHTML=recent.length?`<div class="sec-title" style="margin-top:14px">Ultimi esami</div>`+recent.map(h=>`<div class="hist-item"><span class="hist-date">${h.date}</span><span class="hi-s ${h.score>=10?'pass':'fail'}">${h.score}/15 — ${h.score>=10?'✓ Idoneo':'✗ Non idoneo'}</span></div>`).join(''):'';
  $app().innerHTML=`<div class="hero"><div class="hero-icon">🔥</div><h2>Addetto Antincendio</h2>
  <p>Preparati per l'esame di idoneità tecnica di <strong>Livello 3</strong>.</p></div>
  <div class="stats">
    <div class="stat"><div class="stat-n">345</div><div class="stat-l">Domande totali</div></div>
    <div class="stat"><div class="stat-n">15</div><div class="stat-l">Per esame</div></div>
    <div class="stat"><div class="stat-n">30'</div><div class="stat-l">Durata esame</div></div>
    <div class="stat"><div class="stat-n">${best!==null?best+'/15':'—'}</div><div class="stat-l">Miglior punteggio</div></div>
  </div>
  <button class="btn btn-p" onclick="startExam()">🎯 Inizia Esame Simulato</button>
  <button class="btn btn-s" onclick="showTab('studio')">📚 Modalità Studio</button>
  <div class="card" style="margin-top:16px">
    <div class="info-box"><h3>Regole esame</h3><ul>
      <li>15 domande casuali estratte dal pool di 345</li>
      <li>30 minuti di tempo</li>
      <li>Soglia di idoneità: 10/15 risposte corrette</li>
      <li>Nessuna penalità per risposta errata</li>
    </ul></div>${histHTML}
  </div>`;
}

function startExam(){
  if(E&&E.timerID)clearInterval(E.timerID);
  E={questions:shuffle(Q).slice(0,15),idx:0,answers:{},timeLeft:1800,timerID:null,finished:false};
  E.timerID=setInterval(()=>{
    if(!E||E.finished)return;
    E.timeLeft--;
    const el=document.getElementById('tmr');
    if(el){el.textContent='⏱ '+fmtTime(E.timeLeft);el.className='timer'+(E.timeLeft<=60?' danger':E.timeLeft<=180?' warn':'');}
    if(E.timeLeft<=0)finishExam(true);
  },1000);
  showTab('esame');
}

function renderExam(){
  if(!E){$app().innerHTML=`<div class="empty"><div class="empty-ico">📝</div><p style="margin-bottom:16px">Nessun esame in corso</p><button class="btn btn-p" onclick="startExam()">🎯 Inizia Esame Simulato</button></div>`;return;}
  const q=E.questions[E.idx],answered=q.id in E.answers,userAns=E.answers[q.id],correctK=q.correct;
  const pct=Math.round(((E.idx+(answered?1:0))/15)*100);
  let fbHTML='';
  if(answered){const ok=userAns===correctK;fbHTML=`<div class="fb ${ok?'ok':'ko'}">${ok?'✅ Risposta corretta!':'❌ Sbagliata — risposta corretta: <strong>'+correctK.toUpperCase()+'</strong>'}</div>`;}
  const ansHTML=['a','b','c'].map(k=>{let c='ans-btn';if(answered){if(k===correctK)c+=' ok';else if(k===userAns)c+=' ko';}return`<button class="${c}" onclick="selectAnswer('${k}')" ${answered?'disabled':''}><span class="ltr">${k.toUpperCase()}</span><span>${esc(q[k])}</span></button>`;}).join('');
  let navHTML='';
  if(E.idx>0)navHTML+=`<button class="btn btn-s" onclick="navExam(-1)">← Indietro</button>`;
  if(answered){if(E.idx<14)navHTML+=`<button class="btn btn-p" onclick="navExam(1)">Prossima →</button>`;else navHTML+=`<button class="btn btn-p" onclick="finishExam(false)">🏁 Termina Esame</button>`;}else navHTML+=`<div style="flex:1"></div>`;
  $app().innerHTML=`<div class="prog-wrap"><div class="prog" style="width:${pct}%"></div></div>
  <div class="exam-meta"><span>Domanda <strong>${E.idx+1}</strong>/15</span><span class="timer" id="tmr">⏱ ${fmtTime(E.timeLeft)}</span></div>
  <div class="q-card"><div class="q-num">Domanda ${E.idx+1} di 15 · Q.${q.id}</div>
  <div class="q-text">${esc(q.q)}</div>${imgHtml(q)}</div>
  ${fbHTML}<div class="answers">${ansHTML}</div>
  <div class="nav-btns" style="margin-top:12px">${navHTML}</div>`;
}

function selectAnswer(k){if(!E||E.finished)return;const q=E.questions[E.idx];if(q.id in E.answers)return;E.answers[q.id]=k;renderExam();}
function navExam(dir){if(!E)return;E.idx=Math.max(0,Math.min(14,E.idx+dir));renderExam();}

function finishExam(timeout){
  if(!E)return;E.finished=true;clearInterval(E.timerID);
  let correct=0;E.questions.forEach(q=>{if(E.answers[q.id]===q.correct)correct++;});
  const pass=correct>=10;
  history_.push({date:new Date().toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),score:correct,pass});
  savehist();renderResults(correct,pass,timeout);
}

function renderResults(correct,pass,timeout){
  const wrong=E.questions.filter(q=>E.answers[q.id]&&E.answers[q.id]!==q.correct);
  const skipped=E.questions.filter(q=>!(q.id in E.answers));
  const reviewHTML=wrong.map(q=>`<div class="rev-item">
    ${q.img?`<img src="${q.img}" alt="Cartello" class="rev-img">`:''}
    <div class="rev-q"><strong>Q.${q.id}</strong> — ${esc(q.q)}</div>
    <div class="rev-ans ko"><span class="lbl">✗</span><span>${esc(q[E.answers[q.id]]||'')} <em style="color:var(--text2)">(${(E.answers[q.id]||'').toUpperCase()})</em></span></div>
    <div class="rev-ans ok"><span class="lbl">✓</span><span>${esc(q[q.correct])} <em style="color:var(--text2)">(${q.correct.toUpperCase()})</em></span></div>
  </div>`).join('');
  $app().innerHTML=`<div class="res-hero">
    <div class="score-ring ${pass?'pass':'fail'}">${correct}/15<div class="ring-sub">${pass?'IDONEO':'NON IDONEO'}</div></div>
    <div class="res-lbl">${pass?'🎉 Esame superato!':'😞 Non superato'}</div>
    <div class="res-sub">${timeout?'Il tempo è scaduto. ':''}${pass?'Ottimo! Hai superato la soglia di 10/15.':'Riprova. Servono almeno 10 risposte corrette.'}</div>
  </div>
  <div class="card">
    <div class="rb-row"><span>Risposte corrette</span><span class="rb-v g">${correct}</span></div>
    <div class="rb-row"><span>Risposte errate</span><span class="rb-v r">${wrong.length}</span></div>
    <div class="rb-row"><span>Non risposte</span><span class="rb-v">${skipped.length}</span></div>
    <div class="rb-row"><span>Soglia idoneità</span><span class="rb-v">10 / 15</span></div>
  </div>
  <button class="btn btn-p" onclick="startExam()">🔄 Nuovo Esame</button>
  <button class="btn btn-s" onclick="showTab('home')">🏠 Torna alla Home</button>
  ${wrong.length?`<div class="sec-title" style="margin-top:16px">Da ripassare (${wrong.length})</div>${reviewHTML}`:''}`;
}

function renderStudio(){
  const search=studioSearch.toLowerCase();
  let filtered=Q;
  if(search)filtered=filtered.filter(q=>q.q.toLowerCase().includes(search)||q.a.toLowerCase().includes(search)||q.b.toLowerCase().includes(search)||q.c.toLowerCase().includes(search));
  const stars=getStars();
  if(studioFilter==='star')filtered=filtered.filter(q=>stars.has(q.id));
  if(studioFilter==='img')filtered=filtered.filter(q=>!!q.img);
  const hl=s=>{if(!search)return esc(s);return esc(s).replace(new RegExp('('+search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');};
  $app().innerHTML=`<div class="search-wrap"><span class="s-ico">🔍</span>
    <input type="search" placeholder="Cerca domanda o risposta…" value="${esc(studioSearch)}" oninput="studioSearch=this.value;renderStudio()" autocomplete="off">
  </div>
  <div class="filters">
    <button class="filt ${studioFilter==='all'?'on':''}" onclick="studioFilter='all';renderStudio()">Tutte (${Q.length})</button>
    <button class="filt ${studioFilter==='img'?'on':''}" onclick="studioFilter='img';renderStudio()">🖼 Con cartello (${Q.filter(q=>q.img).length})</button>
    <button class="filt ${studioFilter==='star'?'on':''}" onclick="studioFilter='star';renderStudio()">⭐ Salvate (${stars.size})</button>
  </div>
  <div class="cnt">${filtered.length} domand${filtered.length===1?'a':'e'}</div>
  ${filtered.length===0?`<div class="empty"><div class="empty-ico">🔍</div><p>Nessun risultato</p></div>`:
  filtered.map(q=>{const isOpen=studioOpen[q.id];return`<div class="s-item">
    <div class="s-head" onclick="toggleStudio(${q.id})">
      <span class="s-num">Q.${q.id}${q.img?' 🖼':''}</span>
      <span class="s-qt">${hl(q.q)}</span>
      <span class="s-arr ${isOpen?'open':''}">▾</span>
    </div>
    <div class="s-body ${isOpen?'open':''}">
      ${q.img?`<div class="s-img-wrap"><img src="${q.img}" alt="Cartello Q.${q.id}"></div>`:''}
      ${['a','b','c'].map(k=>`<div class="s-ans ${k===q.correct?'ok':'wrong'}">
        <span class="ltr">${k.toUpperCase()}</span><span>${hl(q[k])}</span>
        ${k===q.correct?'<span style="margin-left:auto;color:var(--green-l);font-size:.78rem">✓</span>':''}
      </div>`).join('')}
      <div style="margin-top:10px">
        <button class="filt ${stars.has(q.id)?'on':''}" onclick="event.stopPropagation();toggleStar(${q.id})">
          ${stars.has(q.id)?'⭐ Salvata':'☆ Salva'}
        </button>
      </div>
    </div>
  </div>`;}).join('')}`;
}

function toggleStudio(id){studioOpen[id]=!studioOpen[id];renderStudio();}
function getStars(){return new Set(JSON.parse(localStorage.getItem('vvf_stars')||'[]'));}
function toggleStar(id){const s=getStars();s.has(id)?s.delete(id):s.add(id);localStorage.setItem('vvf_stars',JSON.stringify([...s]));renderStudio();}

renderHome();
</script>
</body>
</html>
